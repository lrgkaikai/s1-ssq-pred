name: 每日更新部署 S1 预测网站

on:
  schedule:
    # 每天北京时间 9:00 (UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 生成网站
        run: python gen_s1_html.py

      - name: 准备部署目录
        run: |
          mkdir -p _site
          cp s1_results.html _site/index.html

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
