<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="S1双色球预测系统，基于机器学习多模型融合的双色球号码预测与逐期开奖对比分析。包含共现矩阵、指数衰减、热冷号分析等多种预测方法。">
<meta name="keywords" content="双色球,双色球预测,双色球分析,彩票预测,号码预测,开奖对比,机器学习,数据挖掘">
<meta name="author" content="S1预测系统">
<meta name="robots" content="index, follow">
<meta name="baidu-site-verification" content="code-REPLACE_WITH_YOUR_BAIDU_VERIFICATION_CODE">
<meta property="og:title" content="S1 双色球预测系统 — 逐期对比">
<meta property="og:description" content="基于机器学习多模型融合的双色球号码预测与逐期开奖对比分析系统">
<meta property="og:type" content="website">
<title>S1 双色球预测系统 — 逐期对比</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: #0f1117; color: #e0e0e0; min-height: 100vh;
}

/* Header */
.header {
  background: linear-gradient(135deg, #1a1d2e 0%, #2d1f3d 50%, #1a1d2e 100%);
  padding: 28px 0; text-align: center; border-bottom: 1px solid #333;
}
.header h1 { font-size: 26px; color: #fff; letter-spacing: 2px; }
.header .disclaimer { color: #e6a23c; font-size: 12px; margin-top: 8px; background: rgba(230,162,60,0.1); display: inline-block; padding: 6px 16px; border-radius: 4px; border: 1px solid rgba(230,162,60,0.2); }

/* Legend */
.legend {
  display: flex; justify-content: center; gap: 20px; padding: 12px 0;
  background: #141720; font-size: 12px;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-ball { width: 16px; height: 16px; border-radius: 50%; }
.legend-ball.hit { background: #ff3b3b; box-shadow: 0 0 10px rgba(255,59,59,0.6); }
.legend-ball.miss { background: #2a2a3a; border: 1px solid #444; }
.legend-ball.actual { background: #1a1d2e; border: 2px solid #e0e0e0; }

/* Table Container */
.container { max-width: 1100px; margin: 0 auto; padding: 20px 10px; }

/* Period Header */
.period-header {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  background: #1e2130; border-radius: 8px 8px 0 0; border: 1px solid #2a2a3a;
  border-bottom: none; margin-top: 12px;
}
.period-num { font-weight: 700; color: #ffc107; font-size: 14px; min-width: 70px; }
.period-stat { font-size: 11px; color: #666; }
.period-stat.good { color: #4caf50; }
.period-stat.ok { color: #ffc107; }
.period-stat.bad { color: #ff5252; }
.period-rank { margin-left: auto; font-size: 11px; color: #555; }

/* Row */
.row {
  display: grid; grid-template-columns: 80px 1fr 1fr 1fr 100px 50px;
  align-items: center; padding: 10px 12px; gap: 6px;
  border-left: 1px solid #2a2a3a; border-right: 1px solid #2a2a3a;
}
.row.pred { background: #181a26; }
.row.actual { background: #11131c; border-bottom: 1px solid #2a2a3a; border-radius: 0 0 8px 8px; }
.row-label { font-size: 11px; color: #888; font-weight: 600; text-align: center; }

/* Number Balls */
.balls { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.ball {
  width: 34px; height: 34px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 14px;
  font-weight: 700; color: #e0e0e0;
  background: #2a2a3a; border: 1px solid #444;
  transition: all 0.3s;
}
.ball.miss { background: #222639; border-color: #333; color: #666; font-weight: 400; }
.ball.hit {
  background: linear-gradient(135deg, #e53935 0%, #c62828 100%);
  border-color: #ff5252; color: #fff;
  box-shadow: 0 0 14px rgba(229,57,53,0.7), 0 0 4px rgba(229,57,53,0.5);
  animation: hitGlow 1.5s ease-in-out infinite alternate;
  transform: scale(1.08); font-weight: 800;
}
.ball.actual-blue {
  background: #0d47a1; border-color: #42a5f5; color: #fff;
  box-shadow: 0 0 10px rgba(66,165,245,0.5);
}
.ball.blue-hit {
  background: linear-gradient(135deg, #e53935 0%, #0d47a1 100%);
  border-color: #ff5252; color: #fff;
  box-shadow: 0 0 14px rgba(229,57,53,0.7), 0 0 4px rgba(66,165,245,0.5);
  animation: hitGlow 1.5s ease-in-out infinite alternate;
  transform: scale(1.08); font-weight: 800;
}
@keyframes hitGlow {
  0% { box-shadow: 0 0 10px rgba(229,57,53,0.5); }
  100% { box-shadow: 0 0 20px rgba(229,57,53,0.9), 0 0 6px rgba(229,57,53,0.6); }
}

/* Hit Count */
.hit-count { font-size: 16px; font-weight: 700; text-align: center; }
.hit-count.high { color: #4caf50; }
.hit-count.mid { color: #ffc107; }
.hit-count.low { color: #ff5252; }

.period-divider {
  height: 3px; background: linear-gradient(90deg, transparent 0%, #2a2a3a 50%, transparent 100%);
  margin: 4px 0;
}

/* Scroll-to-top */
.scroll-top {
  position: fixed; bottom: 24px; right: 24px; width: 44px; height: 44px;
  border-radius: 50%; background: #2d1f3d; border: 1px solid #555; color: #fff;
  font-size: 20px; cursor: pointer; display: none; align-items: center;
  justify-content: center; z-index: 100; transition: all 0.3s;
}
.scroll-top:hover { background: #3d2f5d; }
.scroll-top.show { display: flex; }

/* Responsive */
@media (max-width: 768px) {
  .row { grid-template-columns: 50px 1fr 1fr 1fr 60px 40px; padding: 8px 4px; gap: 3px; }
  .ball { width: 28px; height: 28px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>S1 双色球预测系统 · 逐期对比</h1>
  <div class="disclaimer">声明：双色球摇奖是随机事件，本系统仅作为娱乐使用，不作为投注依据，涉及法律责任请自负</div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-ball hit"></div> 命中</div>
  <div class="legend-item"><div class="legend-ball miss"></div> 未命中</div>
  <div class="legend-item"><div class="legend-ball actual"></div> 实际开奖</div>
  <div class="legend-item"><div class="legend-ball actual-blue"></div> 蓝球实际</div>
</div>

<div class="container" id="container"></div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ==================== DATA ====================
const DATA = __DATA_PLACEHOLDER__;

// ==================== RENDER ====================
const container = document.getElementById('container');
let overallIdx = 0;

DATA.rows.forEach(row => {
  overallIdx++;
  
  const isPending = row.pending === true;
  const totalRows = DATA.stats.tests + (rows.some(r => r.pending) ? 1 : 0);
  
  // Period header
  const header = document.createElement('div');
  header.className = 'period-header';
  if (isPending) {
    header.innerHTML = `
      <span class="period-num">${row.period}</span>
      <span class="period-stat good" style="color:#ffc107;">待开奖</span>
      <span class="period-rank">最新预测</span>
    `;
  } else {
    let hitClass = 'low';
    if (row.total_h >= 4) hitClass = 'high';
    else if (row.total_h >= 2) hitClass = 'mid';
    
    let statClass = 'bad';
    if (row.total_h >= 4) statClass = 'good';
    else if (row.total_h >= 2) statClass = 'ok';
    
    header.innerHTML = `
      <span class="period-num">${row.period}</span>
      <span class="period-stat ${statClass}">红球 ${row.total_h}/6</span>
      <span class="period-stat" style="color:#5e9eff">${row.bh ? '蓝球 ✓' : '蓝球 ✗'}</span>
      <span class="period-rank">#${overallIdx}/${totalRows}</span>
    `;
  }
  container.appendChild(header);
  
  // Prediction row
  const predRow = document.createElement('div');
  predRow.className = 'row pred';
  
  // Z1
  const z1Balls = document.createElement('div');
  z1Balls.className = 'balls';
  row.z1p.forEach(n => {
    const b = document.createElement('span');
    b.className = 'ball ' + (!isPending && row.z1a.includes(n) ? 'hit' : (isPending ? '' : 'miss'));
    b.textContent = String(n).padStart(2, '0');
    z1Balls.appendChild(b);
  });
  
  // Z2
  const z2Balls = document.createElement('div');
  z2Balls.className = 'balls';
  row.z2p.forEach(n => {
    const b = document.createElement('span');
    b.className = 'ball ' + (!isPending && row.z2a.includes(n) ? 'hit' : (isPending ? '' : 'miss'));
    b.textContent = String(n).padStart(2, '0');
    z2Balls.appendChild(b);
  });
  
  // Z3
  const z3Balls = document.createElement('div');
  z3Balls.className = 'balls';
  row.z3p.forEach(n => {
    const b = document.createElement('span');
    b.className = 'ball ' + (!isPending && row.z3a.includes(n) ? 'hit' : (isPending ? '' : 'miss'));
    b.textContent = String(n).padStart(2, '0');
    z3Balls.appendChild(b);
  });
  
  // Blue prediction
  const bBalls = document.createElement('div');
  bBalls.className = 'balls';
  row.bp.forEach(n => {
    const b = document.createElement('span');
    let cls = 'ball';
    if (n === row.ba) cls += ' blue-hit';
    else if (!isPending) cls += ' miss';
    b.className = cls;
    b.textContent = String(n).padStart(2, '0');
    bBalls.appendChild(b);
  });
  
  // Hit count
  const hitDiv = document.createElement('div');
  if (isPending) {
    hitDiv.style.cssText = 'color:#ffc107;font-size:14px;font-weight:700;text-align:center;';
    hitDiv.textContent = '待开奖';
  } else {
    let hitClass = 'low';
    if (row.total_h >= 4) hitClass = 'high';
    else if (row.total_h >= 2) hitClass = 'mid';
    hitDiv.className = 'hit-count ' + hitClass;
    hitDiv.textContent = row.total_h + '/6';
  }
  
  predRow.innerHTML = '<span class="row-label">预 测</span>';
  predRow.appendChild(z1Balls);
  predRow.appendChild(z2Balls);
  predRow.appendChild(z3Balls);
  predRow.appendChild(bBalls);
  predRow.appendChild(hitDiv);
  container.appendChild(predRow);
  
  // Actual row
  const actRow = document.createElement('div');
  actRow.className = 'row actual';
  
  if (isPending) {
    actRow.innerHTML = '<span class="row-label">实 际</span>';
    const pendingDiv = document.createElement('div');
    pendingDiv.style.cssText = 'grid-column:2/6;color:#ffc107;font-size:14px;text-align:center;padding:12px;';
    pendingDiv.textContent = '等待开奖...';
    actRow.appendChild(pendingDiv);
    container.appendChild(actRow);
    return; // skip actual ball rendering for pending
  }
  
  // Z1 actual
  const z1aBalls = document.createElement('div');
  z1aBalls.className = 'balls';
  row.z1a.forEach(n => {
    const b = document.createElement('span');
    b.className = 'ball ' + (row.z1p.includes(n) ? 'hit' : '');
    b.textContent = String(n).padStart(2, '0');
    z1aBalls.appendChild(b);
  });
  if (row.z1a.length === 0) {
    const empty = document.createElement('span');
    empty.style.cssText = 'color:#444;font-size:12px;';
    empty.textContent = '无';
    z1aBalls.appendChild(empty);
  }
  
  // Z2 actual
  const z2aBalls = document.createElement('div');
  z2aBalls.className = 'balls';
  row.z2a.forEach(n => {
    const b = document.createElement('span');
    b.className = 'ball ' + (row.z2p.includes(n) ? 'hit' : '');
    b.textContent = String(n).padStart(2, '0');
    z2aBalls.appendChild(b);
  });
  if (row.z2a.length === 0) {
    const empty = document.createElement('span');
    empty.style.cssText = 'color:#444;font-size:12px;';
    empty.textContent = '无';
    z2aBalls.appendChild(empty);
  }
  
  // Z3 actual
  const z3aBalls = document.createElement('div');
  z3aBalls.className = 'balls';
  row.z3a.forEach(n => {
    const b = document.createElement('span');
    b.className = 'ball ' + (row.z3p.includes(n) ? 'hit' : '');
    b.textContent = String(n).padStart(2, '0');
    z3aBalls.appendChild(b);
  });
  if (row.z3a.length === 0) {
    const empty = document.createElement('span');
    empty.style.cssText = 'color:#444;font-size:12px;';
    empty.textContent = '无';
    z3aBalls.appendChild(empty);
  }
  
  // Blue actual
  const baBalls = document.createElement('div');
  baBalls.className = 'balls';
  const baBall = document.createElement('span');
  baBall.className = 'ball ' + (row.bp.includes(row.ba) ? 'blue-hit' : 'actual-blue');
  baBall.textContent = String(row.ba).padStart(2, '0');
  baBalls.appendChild(baBall);
  
  actRow.innerHTML = '<span class="row-label">实 际</span>';
  actRow.appendChild(z1aBalls);
  actRow.appendChild(z2aBalls);
  actRow.appendChild(z3aBalls);
  actRow.appendChild(baBalls);
  actRow.appendChild(document.createElement('div')); // empty for hit count column
  container.appendChild(actRow);
});

// Scroll to top button
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 400);
});
</script>

</body>
</html>
