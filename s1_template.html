.period-stat.ok { color: #ffc107; }
.period-stat.bad { color: #ff5252; }
.period-rank { margin-left: auto; font-size: 11px; color: #555; }

/* Row */
.row {
  display: grid; grid-template-columns: 80px 1fr 1fr 1fr 100px 50px;
  align-items: center; padding: 10px 12px; gap: 6px;
  border-left: 1px solid #2a2a3a; border-right: 1px solid #2a2a3a;
}
.row.pred { background: #181a26; }
.row.actual { background: #11131c; border-bottom: 1px solid #2a2a3a; border-radius: 0 0 8px 8px; }
.row-label { font-size: 11px; color: #888; font-weight: 600; text-align: center; }

.balls { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.ball {
  width: 34px; height: 34px; border-radius: 50%; display: flex;

}
.ball.miss { background: #222639; border-color: #333; color: #666; font-weight: 400; }
.ball.hit {
  background: linear-gradient(135deg, #e53935 0%, #c62828 100%);
  border-color: #ff5252; color: #fff;
  box-shadow: 0 0 14px rgba(229,57,53,0.7), 0 0 4px rgba(229,57,53,0.5);
  animation: hitGlow 1.5s ease-in-out infinite alternate;
  transform: scale(1.08); font-weight: 800;
}
.ball.actual-blue {
  background: #0d47a1; border-color: #42a5f5; color: #fff;
  box-shadow: 0 0 10px rgba(66,165,245,0.5);
}
.ball.blue-hit {
  background: linear-gradient(135deg, #e53935 0%, #0d47a1 100%);
  border-color: #ff5252; color: #fff;
  box-shadow: 0 0 14px rgba(229,57,53,0.7), 0 0 4px rgba(66,165,245,0.5);
  animation: hitGlow 1.5s ease-in-out infinite alternate;
  transform: scale(1.08); font-weight: 800;
}
@keyframes hitGlow {
  0% { box-shadow: 0 0 10px rgba(229,57,53,0.5); }
  100% { box-shadow: 0 0 20px rgba(229,57,53,0.9), 0 0 6px rgba(229,57,53,0.6); }

.hit-count { font-size: 16px; font-weight: 700; text-align: center; }

// ==================== RENDER ====================
const stats = DATA.stats;
document.getElementById('stat-rate').textContent = stats.rate + '%';
document.getElementById('stat-total').textContent = stats.red_hits + '/' + (stats.tests * 6);
document.getElementById('stat-blue').textContent = stats.blue_hits + '/' + stats.tests;

let maxHit = 0;
DATA.rows.forEach(r => { if (r.total_h > maxHit) maxHit = r.total_h; });
document.getElementById('stat-best').textContent = maxHit + '/6';

const container = document.getElementById('container');
let overallIdx = 0;

DATA.rows.forEach(row => {
  overallIdx++;
  
  // Determine hit class
  let hitClass = 'low';
  if (row.total_h >= 4) hitClass = 'high';
  else if (row.total_h >= 2) hitClass = 'mid';
  
  let statClass = 'bad';
  if (row.total_h >= 4) statClass = 'good';
  else if (row.total_h >= 2) statClass = 'ok';
  
  // Period header
  const header = document.createElement('div');
  header.className = 'period-header';
  header.innerHTML = `
    <span class="period-num">${row.period}</span>
    <span class="period-stat ${statClass}">红球 ${row.total_h}/6</span>
    <span class="period-stat" style="color:#5e9eff">${row.bh ? '蓝球 ✓' : '蓝球 ✗'}</span>
    <span class="period-rank">#${overallIdx}/42</span>
  `;
  container.appendChild(header);
  
  // Prediction row
  const predRow = document.createElement('div');
  predRow.className = 'row pred';
  
  // Z1
  const z1Balls = document.createElement('div');
  z1Balls.className = 'balls';
  row.z1p.forEach(n => {
    const b = document.createElement('span');
    b.className = 'ball ' + (row.z1a.includes(n) ? 'hit' : 'miss');
    b.textContent = String(n).padStart(2, '0');
    z1Balls.appendChild(b);
  });
  
  // Z2
  const z2Balls = document.createElement('div');
  z2Balls.className = 'balls';
  row.z2p.forEach(n => {
    const b = document.createElement('span');
    b.className = 'ball ' + (row.z2a.includes(n) ? 'hit' : 'miss');
    b.textContent = String(n).padStart(2, '0');
    z2Balls.appendChild(b);
  });
  
  // Z3
  const z3Balls = document.createElement('div');
  z3Balls.className = 'balls';
  row.z3p.forEach(n => {
    const b = document.createElement('span');
    b.className = 'ball ' + (row.z3a.includes(n) ? 'hit' : 'miss');
    b.textContent = String(n).padStart(2, '0');
    z3Balls.appendChild(b);
  });
  
  // Blue prediction
  const bBalls = document.createElement('div');
  bBalls.className = 'balls';
  row.bp.forEach(n => {
    const b = document.createElement('span');
    let cls = 'ball';
    if (n === row.ba) cls += ' blue-hit';
    else cls += ' miss';
    b.className = cls;
    b.textContent = String(n).padStart(2, '0');
    bBalls.appendChild(b);
  });
  
  // Hit count
  const hitDiv = document.createElement('div');
  hitDiv.className = 'hit-count ' + hitClass;
  hitDiv.textContent = row.total_h + '/6';
  
  predRow.innerHTML = '<span class="row-label">预 测</span>';
  predRow.appendChild(z1Balls);
  predRow.appendChild(z2Balls);
  predRow.appendChild(z3Balls);
  predRow.appendChild(bBalls);
  predRow.appendChild(hitDiv);
  container.appendChild(predRow);
  
  // Actual row
  const actRow = document.createElement('div');
  actRow.className = 'row actual';
  
  // Z1 actual
  const z1aBalls = document.createElement('div');
  z1aBalls.className = 'balls';
  row.z1a.forEach(n => {
    const b = document.createElement('span');
    b.className = 'ball ' + (row.z1p.includes(n) ? 'hit' : '');
    b.textContent = String(n).padStart(2, '0');
    z1aBalls.appendChild(b);
  });
  if (row.z1a.length === 0) {
    const empty = document.createElement('span');
    empty.style.cssText = 'color:#444;font-size:12px;';
    empty.textContent = '无';
    z1aBalls.appendChild(empty);
  }
  
  // Z2 actual
  const z2aBalls = document.createElement('div');
  z2aBalls.className = 'balls';
  row.z2a.forEach(n => {
    const b = document.createElement('span');
    b.className = 'ball ' + (row.z2p.includes(n) ? 'hit' : '');
    b.textContent = String(n).padStart(2, '0');
    z2aBalls.appendChild(b);
  });
  if (row.z2a.length === 0) {
    const empty = document.createElement('span');
    empty.style.cssText = 'color:#444;font-size:12px;';
    empty.textContent = '无';
    z2aBalls.appendChild(empty);
  }
  
  // Z3 actual
  const z3aBalls = document.createElement('div');
  z3aBalls.className = 'balls';
  row.z3a.forEach(n => {
    const b = document.createElement('span');
    b.className = 'ball ' + (row.z3p.includes(n) ? 'hit' : '');
    b.textContent = String(n).padStart(2, '0');
    z3aBalls.appendChild(b);
  });
  if (row.z3a.length === 0) {
    const empty = document.createElement('span');
    empty.style.cssText = 'color:#444;font-size:12px;';
    empty.textContent = '无';
    z3aBalls.appendChild(empty);
  }
  
  // Blue actual
  const baBalls = document.createElement('div');
  baBalls.className = 'balls';
  const baBall = document.createElement('span');
  baBall.className = 'ball ' + (row.bp.includes(row.ba) ? 'blue-hit' : 'actual-blue');
  baBall.textContent = String(row.ba).padStart(2, '0');
  baBalls.appendChild(baBall);
  
  actRow.innerHTML = '<span class="row-label">实 际</span>';
  actRow.appendChild(z1aBalls);
  actRow.appendChild(z2aBalls);
  actRow.appendChild(z3aBalls);
  actRow.appendChild(baBalls);
  actRow.appendChild(document.createElement('div')); // empty for hit count column
  container.appendChild(actRow);
});

window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 400);
});
